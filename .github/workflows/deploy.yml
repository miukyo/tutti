name: Deploy

on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: 'bash'

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{inputs.distribution-channel}}
      url: https://github.com/${{github.repository}}/releases/tag/v${{inputs.app-version}}
    steps:
      - name: Download compiled app
        uses: actions/download-artifact@v8
        with:
          pattern: "*-${{inputs.distribution-channel}}"
          path: dist
          merge-multiple: true

      - run: gh release create v${{inputs.app-version}} $(find dist -maxdepth 1 -type f) --repo ${{github.repository}}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Locate Build Files
        id: locate-files
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USERNAME: ${{ secrets.ITCH_USERNAME }}
        run: |
          echo "windows_x64_file=$(find dist -maxdepth 1 -type f -name "*x64*.exe" | head -n 1)" >> $GITHUB_OUTPUT
          echo "windows_arm64_file=$(find dist -maxdepth 1 -type f -name "*arm64*.exe" | head -n 1)" >> $GITHUB_OUTPUT
          echo "mac_x64_file=$(find dist -maxdepth 1 -type f -name "*x64*.dmg" | head -n 1)" >> $GITHUB_OUTPUT
          echo "mac_arm64_file=$(find dist -maxdepth 1 -type f -name "*arm64*.dmg" | head -n 1)" >> $GITHUB_OUTPUT
          echo "linux_x64_file=$(find dist -maxdepth 1 -type f -name "*x64*.deb" | head -n 1)" >> $GITHUB_OUTPUT
          echo "linux_arm64_file=$(find dist -maxdepth 1 -type f -name "*arm64*.deb" | head -n 1)" >> $GITHUB_OUTPUT

          if [ -n "$BUTLER_CREDENTIALS" ] && [ -n "$ITCH_GAME" ] && [ -n "$ITCH_USERNAME" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Windows x64 to Itch.io
        if: ${{ steps.locate-files.outputs.windows_x64_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows-x64
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.windows_x64_file }}
          VERSION: ${{ inputs.app-version }}

      - name: Deploy Windows arm64 to Itch.io
        if: ${{ steps.locate-files.outputs.windows_arm64_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows-arm64
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.windows_arm64_file }}
          VERSION: ${{ inputs.app-version }}

      - name: Deploy macOS x64 to Itch.io
        if: ${{ steps.locate-files.outputs.mac_x64_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: osx-x64
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.mac_x64_file }}
          VERSION: ${{ inputs.app-version }}

      - name: Deploy macOS arm64 to Itch.io
        if: ${{ steps.locate-files.outputs.mac_arm64_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: osx-arm64
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.mac_arm64_file }}
          VERSION: ${{ inputs.app-version }}

      - name: Deploy Linux x64 to Itch.io
        if: ${{ steps.locate-files.outputs.linux_x64_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux-x64
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.linux_x64_file }}
          VERSION: ${{ inputs.app-version }}

      - name: Deploy Linux arm64 to Itch.io
        if: ${{ steps.locate-files.outputs.linux_arm64_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux-arm64
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.linux_arm64_file }}
          VERSION: ${{ inputs.app-version }}


