name: Deploy

on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: 'bash'

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{inputs.distribution-channel}}
      url: https://github.com/${{github.repository}}/releases/tag/v${{inputs.app-version}}
    steps:
      - name: Download compiled app
        uses: actions/download-artifact@v8
        with:
          pattern: "*-${{inputs.distribution-channel}}"
          path: dist
          merge-multiple: true

      - run: gh release create v${{inputs.app-version}} $(find dist -maxdepth 1 -type f) --repo ${{github.repository}}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Locate Build Files
        id: locate-files
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USERNAME: ${{ secrets.ITCH_USERNAME }}
        run: |
          echo "windows_file=$(find dist -name "*.exe" -maxdepth 1 | head -n 1)" >> $GITHUB_OUTPUT
          echo "mac_file=$(find dist -name "*.dmg" -maxdepth 1 | head -n 1)" >> $GITHUB_OUTPUT
          echo "linux_file=$(find dist -name "*.deb" -maxdepth 1 | head -n 1)" >> $GITHUB_OUTPUT

          if [ -n "$BUTLER_CREDENTIALS" ] && [ -n "$ITCH_GAME" ] && [ -n "$ITCH_USERNAME" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Windows to Itch.io
        if: ${{ steps.locate-files.outputs.windows_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.windows_file }}
          VERSION: ${{ inputs.app-version }}

      - name: Deploy macOS to Itch.io
        if: ${{ steps.locate-files.outputs.mac_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: osx
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.mac_file }}
          VERSION: ${{ inputs.app-version }}

      - name: Deploy Linux to Itch.io
        if: ${{ steps.locate-files.outputs.linux_file != '' && steps.locate-files.outputs.has_credentials == 'true' }}
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ${{ steps.locate-files.outputs.linux_file }}
          VERSION: ${{ inputs.app-version }}


